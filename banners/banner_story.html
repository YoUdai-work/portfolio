<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Lumière ストーリーズバナー 1080×1920</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e9e9ee;font-family:"Noto Sans JP",sans-serif}
.banner{position:relative;width:1080px;height:1920px;overflow:hidden;background:#fbf7f2}
.photo{position:absolute;inset:0;background:url('img/model_jp.png') center 8%/cover}
/* 上下を白くしてテキストエリア確保＋肌を隠す */
.veil{position:absolute;inset:0;background:
  linear-gradient(180deg,#fbf7f2 8%,rgba(251,247,242,.55) 20%,rgba(251,247,242,0) 32%),
  linear-gradient(0deg,#fbf7f2 20%,rgba(251,247,242,.85) 32%,rgba(251,247,242,0) 50%)}
.sp{position:absolute;color:#cdab6e;text-shadow:0 0 16px rgba(205,171,110,.55)}
.sp1{top:560px;left:140px;font-size:36px}.sp2{top:660px;left:210px;font-size:20px}
.content{position:absolute;inset:0;padding:120px 90px 130px;display:flex;flex-direction:column}
.brand{font-family:"Noto Serif JP",serif;font-size:50px;color:#3a3330;letter-spacing:.14em;text-align:center}
.brand small{display:block;font-family:"Noto Sans JP",sans-serif;font-size:16px;letter-spacing:.34em;color:#b89b6e;margin-top:7px}
.eyebrow{margin-top:34px;text-align:center;font-size:28px;color:#8a7d6c;letter-spacing:.05em}
.catch{font-family:"Noto Serif JP",serif;font-weight:700;color:#3a3330;font-size:88px;line-height:1.32;margin-top:18px;text-align:center;text-shadow:0 1px 18px rgba(251,247,242,.95)}
.catch .hl{color:#c98b96;position:relative}
.catch .hl::after{content:"";position:absolute;left:0;bottom:8px;width:100%;height:16px;background:rgba(201,139,150,.25);z-index:-1}
.spacer{flex:1}
.badge{align-self:center;border:1.5px solid #cdab6e;color:#9a7f54;font-size:24px;font-weight:700;padding:9px 26px;border-radius:36px;margin-bottom:30px;background:rgba(255,255,255,.7)}
.price{text-align:center}
.price .lead{font-size:28px;color:#9a7f54;font-weight:700;letter-spacing:.06em}
.price .row{display:flex;align-items:flex-end;justify-content:center;gap:22px;margin-top:6px}
.price .was{font-size:30px;color:#9b9089;text-decoration:line-through;padding-bottom:24px}
.price .now{font-family:"Noto Serif JP",serif;font-weight:700;color:#c0566a;font-size:150px;line-height:.85}
.price .now .y{font-size:66px}
.price .t{font-size:24px;color:#6b625c;margin-top:6px}
.cta{margin:36px auto 0;background:linear-gradient(135deg,#d29aa3,#c0566a);color:#fff;font-size:42px;font-weight:700;padding:28px 70px;border-radius:60px;letter-spacing:.05em;box-shadow:0 16px 36px rgba(192,86,106,.36)}
</style>
</head>
<body>
<div class="banner">
  <div class="photo"></div>
  <div class="veil"></div>
  <span class="sp sp1">✦</span><span class="sp sp2">✧</span>
  <div class="content">
    <div class="brand">Lumière<small>PRIVATE FACIAL SALON</small></div>
    <div class="eyebrow">乾燥・くすみに、さよなら</div>
    <div class="catch">素肌から、<br><span class="hl">透明感</span>のある私へ。</div>
    <div class="spacer"></div>
    <div class="badge">完全個室・勧誘なし</div>
    <div class="price">
      <span class="lead">初回体験キャンペーン</span>
      <div class="row">
        <span class="was">¥7,700</span>
        <span class="now"><span class="y">¥</span>4,980</span>
      </div>
      <div class="t">税込・60分（はじめての方限定）</div>
    </div>
    <div class="cta">ご予約はこちら ＞</div>
  </div>
</div>
</body>
</html>
