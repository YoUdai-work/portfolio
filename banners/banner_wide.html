<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Lumière 横長バナー 1200×628</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e9e9ee;font-family:"Noto Sans JP",sans-serif}
.banner{position:relative;width:1200px;height:628px;overflow:hidden;background:#fbf7f2}
.photo{position:absolute;top:0;right:0;width:46%;height:100%;background:url('img/model_jp.png') 28% 6%/cover}
.skinhide{position:absolute;inset:0;background:
  linear-gradient(90deg,#fbf7f2 40%,rgba(251,247,242,.85) 52%,rgba(251,247,242,.12) 66%,rgba(251,247,242,0) 74%),
  linear-gradient(0deg,#fbf7f2 1%,rgba(251,247,242,.9) 12%,rgba(251,247,242,0) 34%)}
.sp{position:absolute;color:#cdab6e;text-shadow:0 0 12px rgba(205,171,110,.5)}
.sp1{top:70px;left:660px;font-size:26px}
.content{position:absolute;inset:0;padding:58px 64px;display:flex;flex-direction:column}
.brand{font-family:"Noto Serif JP",serif;font-size:36px;color:#3a3330;letter-spacing:.12em}
.brand small{display:block;font-family:"Noto Sans JP",sans-serif;font-size:12px;letter-spacing:.3em;color:#b89b6e;margin-top:4px}
.pill{margin-top:18px;align-self:flex-start;border:1.5px solid #cdab6e;color:#9a7f54;font-size:17px;font-weight:700;padding:6px 18px;border-radius:30px}
.catch{font-family:"Noto Serif JP",serif;font-weight:700;color:#3a3330;font-size:58px;line-height:1.28;margin-top:18px;text-shadow:0 1px 14px rgba(251,247,242,.9)}
.catch .hl{color:#c98b96;position:relative}
.catch .hl::after{content:"";position:absolute;left:0;bottom:5px;width:100%;height:11px;background:rgba(201,139,150,.22);z-index:-1}
.spacer{flex:1}
.price{display:flex;align-items:flex-end;gap:18px}
.price .lead{font-size:20px;color:#9a7f54;font-weight:700;padding-bottom:10px}
.price .was{font-size:21px;color:#9b9089;text-decoration:line-through;padding-bottom:11px}
.price .now{font-family:"Noto Serif JP",serif;font-weight:700;color:#c0566a;font-size:78px;line-height:.85}
.price .now .y{font-size:38px}.price .now .t{font-size:16px;color:#6b625c}
.cta{margin-top:22px;align-self:flex-start;background:linear-gradient(135deg,#d29aa3,#c0566a);color:#fff;font-size:27px;font-weight:700;padding:18px 46px;border-radius:46px;letter-spacing:.04em;box-shadow:0 12px 28px rgba(192,86,106,.32)}
</style>
</head>
<body>
<div class="banner">
  <div class="photo"></div>
  <div class="skinhide"></div>
  <span class="sp sp1">✦</span>
  <div class="content">
    <div class="brand">Lumière<small>PRIVATE FACIAL SALON</small></div>
    <div class="pill">完全個室・勧誘なし</div>
    <div class="catch">素肌から、<span class="hl">透明感</span>のある私へ。</div>
    <div class="spacer"></div>
    <div class="price">
      <span class="lead">初回体験</span>
      <span class="was">¥7,700</span>
      <span class="now"><span class="y">¥</span>4,980<span class="t"> 税込/60分</span></span>
    </div>
    <div class="cta">ご予約はこちら ＞</div>
  </div>
</div>
</body>
</html>
